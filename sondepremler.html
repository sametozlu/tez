<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Son Depremler</title>
  <style>
    :root {
      --bg: #091221;
      --card: #0f1f37;
      --text: #e5edf9;
      --border: #1f3659;
      --primary: #3b82f6;
      --muted: #9fb4d1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #16315b 0%, var(--bg) 48%);
    }
    .container {
      width: min(1120px, 94%);
      margin: 0 auto;
      padding: 30px 0 44px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .header a {
      text-decoration: none;
      color: #fff;
      border: 1px solid var(--border);
      background: var(--primary);
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 600;
    }
    .card {
      background: linear-gradient(180deg, #112848, var(--card));
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    thead { background: #0a172a; }
    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: .95rem;
    }
    .status {
      color: var(--muted);
      margin: 8px 0 0;
      min-height: 24px;
    }
    .menu {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .menu a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .menu a:hover {
      background: var(--primary);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <h1>Son Depremler</h1>
      <a href="index.html">Ana Sayfaya Don</a>
    </div>
    <nav class="menu">
      <a href="index.html">Anasayfa</a>
      <a href="depremnedir.html">Deprem Nedir?</a>
      <a href="depremturleri.html">Deprem Turleri</a>
      <a href="sondepremler.html">Son Depremler</a>
    </nav>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Tarih</th>
            <th>Enlem</th>
            <th>Boylam</th>
            <th>Buyukluk</th>
            <th>Derinlik</th>
            <th>Yer</th>
          </tr>
        </thead>
        <tbody id="depremListesi"></tbody>
      </table>
    </div>
    <p class="status" id="statusText">Veriler yukleniyor...</p>
  </main>

  <script>
    const list = document.getElementById("depremListesi");
    const statusText = document.getElementById("statusText");
    const endpoints = [
      { url: "https://api.orhanaydogdu.com.tr/deprem/kandilli/live?limit=20", name: "Kandilli" },
      { url: "https://api.orhanaydogdu.com.tr/deprem/afad/live?limit=20", name: "AFAD" }
    ];

    function normalize(deprem) {
      const lat = deprem.geojson && deprem.geojson.coordinates ? deprem.geojson.coordinates[1] : (deprem.lat || "-");
      const lng = deprem.geojson && deprem.geojson.coordinates ? deprem.geojson.coordinates[0] : (deprem.lng || "-");
      return {
        date: deprem.date_time || deprem.date || "-",
        lat,
        lng,
        mag: deprem.mag || deprem.ml || "-",
        depth: deprem.depth || "-",
        place: deprem.title || deprem.location || "-"
      };
    }

    function renderRows(items) {
      items.forEach((deprem) => {
        const d = normalize(deprem);
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${d.date}</td>
          <td>${d.lat}</td>
          <td>${d.lng}</td>
          <td>${d.mag}</td>
          <td>${d.depth}</td>
          <td>${d.place}</td>
        `;
        list.appendChild(row);
      });
    }

    async function loadEarthquakes() {
      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint.url, { cache: "no-store" });
          if (!response.ok) continue;
          const data = await response.json();
          if (!data || !Array.isArray(data.result) || !data.result.length) continue;
          renderRows(data.result);
          statusText.textContent = endpoint.name + " verileri guncel olarak cekildi.";
          return;
        } catch (err) {
          console.error("Deprem verisi hatasi:", endpoint.name, err);
        }
      }
      statusText.textContent = "Deprem verileri getirilirken hata olustu. Lutfen sayfayi yenileyin.";
    }

    loadEarthquakes();
  </script>
</body>
</html>
